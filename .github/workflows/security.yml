name: Security
on:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install pip-audit bandit semgrep
      - run: pip-audit
      - run: bandit -r src -ll
      - run: semgrep --config auto src
      - run: npm audit --audit-level=high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start API
        run: |
          docker compose -f docker/docker-compose.yml up -d api redis qdrant
          for i in $(seq 1 30); do curl -fsS http://localhost:8080/healthz && break || sleep 2; done
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://host.docker.internal:8080'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap_baseline_report
      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
