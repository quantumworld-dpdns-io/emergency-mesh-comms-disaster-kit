name: Security
on:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pip-audit bandit semgrep
      - run: pip-audit || true
      - run: bandit -r src || true
      - run: semgrep --config auto src || true
